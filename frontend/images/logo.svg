<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#FFF8F0" stroke="#E07A2F" stroke-width="3"/>

  <!-- Decorative inner ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#F5C518" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>

  <!-- Spoon icon -->
  <g transform="translate(50, 28) rotate(15)" opacity="0.2">
    <ellipse cx="0" cy="-5" rx="6" ry="9" fill="#C4601A"/>
    <rect x="-1.5" y="4" width="3" height="18" rx="1.5" fill="#C4601A"/>
  </g>

  <!-- Letter R -->
  <text x="50" y="62" text-anchor="middle" font-family="serif" font-weight="bold" font-size="42" fill="#E07A2F">R</text>

  <!-- Small decorative dots -->
  <circle cx="25" cy="50" r="2" fill="#F5C518" opacity="0.5"/>
  <circle cx="75" cy="50" r="2" fill="#F5C518" opacity="0.5"/>
</svg>
